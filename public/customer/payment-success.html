<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Payment Successful</title>

    <link rel="stylesheet" href="../css/output.css" />
    <script src="/js/i18n.js"></script>
</head>

<body>
    <!-- ===== NAVBAR ===== -->
    <nav class="flex justify-between items-center">
        <div class="flex gap-5">
            <a href="/customer" class="text-xl" data-i18n="nav_home">Home</a>
            <a href="/customer/hawkers.html" class="text-xl" data-i18n="nav_browse">Browse</a>
        </div>
        <div class="flex gap-5 items-center">
            <a href="/customer/cart.html" class="text-xl" data-i18n="nav_cart">Cart</a>
            <a href="/customer/profile.html" class="text-xl" data-i18n="nav_profile">Profile</a>
            <!-- 语言切换 -->
            <div class="flex gap-1 ml-4">
                <button onclick="window.i18n.setLanguage('en')" 
                        class="px-3 py-1 text-sm font-medium rounded border border-gray-300 hover:bg-gray-100 transition">
                    EN
                </button>
                <button onclick="window.i18n.setLanguage('zh')" 
                        class="px-3 py-1 text-sm font-medium rounded border border-gray-300 hover:bg-gray-100 transition">
                    中文
                </button>
            </div>
        </div>
    </nav>

    <!-- ===== MAIN CONTENT ===== -->
    <main class="mx-auto max-w-3xl space-y-6 p-8 pb-32">
        <!-- Success Card -->
        <div class="rounded-xl border bg-white p-8 shadow-sm text-center">
            <!-- Icon -->
            <div class="mx-auto mb-4 flex h-16 w-16 items-center justify-center rounded-full bg-green-100 text-3xl">
                ✅
            </div>

            <h1 class="text-3xl font-bold text-green-600" data-i18n="payment_successful">Payment Successful!</h1>
            <p class="mt-2 text-gray-600" data-i18n="thank_you">Thank you for your order.</p>

            <!-- Order Summary -->
            <div class="mt-8 text-left border-t pt-6">
                <h2 class="text-lg font-semibold" data-i18n="order_summary">Order Summary</h2>
                <div id="order-items" class="mt-3 space-y-2">
                    <!-- Dynamically populated -->
                </div>
                <div class="mt-4 flex justify-between border-t pt-4 text-lg font-bold">
                    <span data-i18n="total_label">Total</span>
                    <span id="order-total">$0.00</span>
                </div>
            </div>

            <!-- Order ID -->
            <p id="order-id" class="mt-4 text-sm text-gray-400" data-i18n="order_id">Order ID: Loading...</p>

            <!-- Email notice -->
            <div class="mt-6 rounded-lg bg-gray-50 p-4 text-sm text-gray-600" data-i18n="receipt_sent">
                📧 A receipt has been sent to your email.
            </div>

            <!-- Actions -->
            <div class="mt-8 flex flex-wrap justify-center gap-4">
                <a href="/customer" class="rounded-lg bg-black px-6 py-3 font-medium text-white transition hover:bg-gray-800" data-i18n="back_to_home">
                    Back to Home
                </a>
                <a href="/customer/orders.html" class="rounded-lg border border-gray-300 px-6 py-3 font-medium text-gray-700 transition hover:bg-gray-50" data-i18n="view_orders">
                    View Orders
                </a>
            </div>
        </div>
    </main>

    <!-- ===== FOOTER ===== -->
    <footer class="fixed bottom-0 left-0 right-0 border-t bg-white/95 backdrop-blur">
        <div class="mx-auto flex max-w-5xl items-center justify-between p-5">
            <p class="text-sm text-gray-500">© 2026 Hawker Centre</p>
            <p class="text-sm text-gray-500" data-i18n="enjoy_your_meal">Enjoy your meal!</p>
        </div>
    </footer>

    <script>
        // Read URL params
        const params = new URLSearchParams(window.location.search);
        const orderIds = params.get('orderIds');
        const total = params.get('total');

        // Display order ID
        if (orderIds) {
            document.getElementById('order-id').textContent = `Order ID: ${orderIds}`;
        }

        // Display total
        if (total) {
            document.getElementById('order-total').textContent = `$${parseFloat(total).toFixed(2)}`;
        }

        // Try to load order summary from sessionStorage
        const summary = sessionStorage.getItem('orderSummary');
        if (summary) {
            try {
                const data = JSON.parse(summary);
                const container = document.getElementById('order-items');
                let html = '';
                data.items.forEach(item => {
                    html += `
                        <div class="flex justify-between text-sm">
                            <span>${item.name} × ${item.quantity}</span>
                            <span>$${(item.price * item.quantity).toFixed(2)}</span>
                        </div>
                    `;
                });
                container.innerHTML = html;
                if (data.total) {
                    document.getElementById('order-total').textContent = `$${data.total.toFixed(2)}`;
                }
                // Clear after use
                sessionStorage.removeItem('orderSummary');
            } catch (e) {
                console.warn('Could not parse order summary', e);
            }
        }
    </script>

    <script src="https://unpkg.com/lucide@latest"></script>
    <script>
        lucide.createIcons();
    </script>
</body>

</html>
