<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Staff Login</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>

  <div class="scene">
    <div class="signage">Staff Only</div>
    <div class="ticket">
      <div class="stub">OP</div>
      <div class="perf"></div>
      <h1>Staff sign in</h1>
      <p class="subtitle">OPERATOR ACCOUNTS ONLY</p>

      <div class="form-note" id="formNote"></div>

      <form id="operatorForm" novalidate>
        <div class="field" id="emailField">
          <label for="email">Email</label>
          <input type="email" id="email" name="email" placeholder="operator@example.com" autocomplete="email">
          <span class="field-error" id="emailError"></span>
        </div>

        <div class="field" id="passwordField">
          <label for="password">Password</label>
          <input type="password" id="password" name="password" placeholder="••••••••" autocomplete="current-password">
          <span class="field-error" id="passwordError"></span>
        </div>

        <button type="submit" class="submit" id="submitBtn">Sign in as staff</button>
      </form>

      <p class="switch-link"><a href="index.html">← Back to customer sign-in</a></p>
    </div>
  </div>

  <script src="js/jwt-utils.js"></script>
  <script src="js/operatorLogin.js"></script>
</body>
</html>
