<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Create Account</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>

  <div class="scene">
    <div class="signage">New Customer</div>
    <div class="ticket">
      <div class="stub">NO. 02</div>
      <div class="perf"></div>
      <h1>Create your account</h1>
      <p class="subtitle">SIGN UP TO START ORDERING</p>

      <div class="form-note" id="formNote"></div>

      <form id="registerForm" novalidate>
        <div class="field" id="nameField">
          <label for="name">Name</label>
          <input type="text" id="name" name="name" placeholder="Full name" autocomplete="name">
          <span class="field-error" id="nameError"></span>
        </div>

        <div class="field" id="emailField">
          <label for="email">Email</label>
          <input type="email" id="email" name="email" placeholder="you@example.com" autocomplete="email">
          <span class="field-error" id="emailError"></span>
        </div>

        <div class="field" id="passwordField">
          <label for="password">Password</label>
          <input type="password" id="password" name="password" placeholder="At least 8 characters" autocomplete="new-password">
          <span class="field-error" id="passwordError"></span>
        </div>

        <div class="field" id="confirmField">
          <label for="confirm">Confirm password</label>
          <input type="password" id="confirm" name="confirm" placeholder="Retype password" autocomplete="new-password">
          <span class="field-error" id="confirmError"></span>
        </div>

        <button type="submit" class="submit" id="submitBtn">Create account</button>
      </form>

      <p class="switch-link">Already have an account? <a href="index.html">Sign in</a></p>
    </div>
  </div>

  <a href="operator.html" class="desk-link">Staff login</a>

  <script src="js/register.js"></script>
</body>
</html>
