<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Vendor Dashboard</title>

    <link rel="stylesheet" href="../css/output.css" />
</head>

<body>
    <nav class="flex gap-5">
        <a href="/vendor" class="text-xl">Home</a>
        <a href="/vendor/orders.html" class="text-xl">Orders</a>
        <a href="/vendor/stall.html" class="text-xl ml-auto">Stall</a>
    </nav>

    <section class="flex items-center justify-between">
        <div>
            <h1 class="text-3xl">Orders</h1>
        </div>

        <div class="flex items-center gap-3">
            <label for="statusFilter" class="text-sm font-medium text-slate-700">
                Status
            </label>

            <div class="relative">
                <select id="statusFilter"
                    class="h-10 w-44 appearance-none rounded-md border border-slate-200 bg-white pl-3 pr-10 text-sm shadow-sm focus:outline-none focus:ring-2 focus:ring-slate-200">
                    <option>All</option>
                    <option>Pending</option>
                    <option>Preparing</option>
                    <option>Ready</option>
                    <option>Completed</option>
                    <option>Cancelled</option>
                </select>

                <i data-lucide="chevron-down"
                    class="pointer-events-none absolute right-3 top-1/2 h-4 w-4 -translate-y-1/2 text-slate-400"></i>
            </div>
        </div>
    </section>

    <section class="overflow-hidden rounded-lg border border-slate-200 bg-white">
        <table class="w-full text-left text-sm">
            <thead class="border-b border-slate-200 bg-slate-50">
                <tr class="text-slate-600">
                    <th class="w-16 px-5 py-4 font-semibold">Queue</th>
                    <th class="w-36 px-5 py-4 font-semibold">Order ID</th>
                    <th class="w-36 px-5 py-4 font-semibold">Customer ID</th>
                    <th class="px-5 py-4 font-semibold">Items</th>
                    <th class="w-28 px-5 py-4 text-right font-semibold">Total</th>
                    <th class="w-24 px-5 py-4 text-center font-semibold">Eco</th>
                    <th class="w-36 px-5 py-4 font-semibold">Status</th>
                </tr>
            </thead>

            <tbody id="order-table" class="divide-y divide-slate-100"></tbody>
        </table>
    </section>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="/js/const.js"></script>
    <script type="module" src="/js/vendor-order.js"></script>
</body>

</html>
